name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify production bundle (not dev index.html)
        run: |
          if grep -q 'src="/src/' dist/index.html || grep -q "src='/src/" dist/index.html; then
            echo "::error::dist/index.html still references /src — build output looks like dev template"
            cat dist/index.html
            exit 1
          fi
      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html
      - name: Publish dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
